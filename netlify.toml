[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/go/*"
  to = "/.netlify/functions/go"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/api/send-weekly-alerts"
  to = "/.netlify/functions/send-weekly-alerts"
  status = 200

[[redirects]]
  from = "/api/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/api/vote"
  to = "/.netlify/functions/vote"
  status = 200

# --- Server-rendered city + category pages (SEO) ---
# City landing pages
[[redirects]]
  from = "/plano"
  to = "/.netlify/functions/pages"
  status = 200

[[redirects]]
  from = "/frisco"
  to = "/.netlify/functions/pages"
  status = 200

[[redirects]]
  from = "/baltimore"
  to = "/.netlify/functions/pages"
  status = 200

# Category pages (city/category)
[[redirects]]
  from = "/plano/*"
  to = "/.netlify/functions/pages"
  status = 200

[[redirects]]
  from = "/frisco/*"
  to = "/.netlify/functions/pages"
  status = 200

[[redirects]]
  from = "/baltimore/*"
  to = "/.netlify/functions/pages"
  status = 200

[[redirects]]
  from = "/all/*"
  to = "/.netlify/functions/pages"
  status = 200

# Legal pages
[[redirects]]
  from = "/privacy"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/index.html"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
