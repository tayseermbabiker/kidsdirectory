[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/go/*"
  to = "/.netlify/functions/go"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# SPA fallback for category pages
[[redirects]]
  from = "/plano/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/frisco/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
